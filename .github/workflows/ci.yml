name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -o nullpaste ./cmd/nullpaste

      - name: Run tests
        run: go test ./...

  cross-build:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        go-version: ['1.24']
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o nullpaste-${GOOS}-${GOARCH}${ext} ./cmd/nullpaste

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nullpaste-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: nullpaste-*
